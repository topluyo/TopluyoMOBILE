name: topluyo
description: "Topluyo Mobile App"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.1.5
  flutter_foreground_task: ^10.0.0
  permission_handler: ^12.0.3
  url_launcher: ^6.3.2
  app_links: ^7.2.1
  device_info_plus: ^13.2.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "topluyo.png"

